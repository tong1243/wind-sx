server:
  port: 12700

spring:
  datasource:
    url: jdbc:mysql://172.26.32.1:3307/wind?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&allowMultiQueries=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&allowMultiQueries=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    minimum-idle: 5
    maximum-pool-size: 10
    auto-commit: true
    idle-timeout: 30000
    pool-name: DatebookHikariCP
    max-lifetime: 1800000
    connection-timeout: 30000

  data:
    redis:
      database: 5
      host: 172.26.32.1
      port: 6379
      password: 123456
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 4
        max-wait: 5000
  kafka:
    bootstrap-servers: 172.26.32.1:9092
    zookeeper-connect: 172.26.32.1:2181
    listener:
      ack-mode: manual_immediate
      type: batch
      max-poll-records: 10
    consumer:
      enable-auto-commit: false
      auto-commit-interval: 100
      auto-offset-reset: earliest
      max-poll-records: 100
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

logging:
  config: "classpath:logback.xml"

mybatis-plus:
  mapperLocations: ["classpath*:/Mapper/*.xml"]
